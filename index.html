<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PHR EXIF Tool (Enterprise Mode)</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px;}
input,button{padding:10px;margin:5px;border-radius:8px;border:none;}
button{cursor:pointer;background:#4ade80;}
.file{margin:10px 0;padding:10px;background:#1e293b;border-radius:8px;}
</style>
</head>

<body>

<h2>PHR EXIF TOOL (ENTERPRISE MODE)</h2>

<input id="targetUrl" placeholder="Target URL"/>
<br><br>

<input type="file" id="fileInput" multiple accept="image/*"/>
<br><br>

<button onclick="process()">GO EXIFING</button>
<button onclick="downloadZip()">Download ZIP</button>

<div id="files"></div>

<script type="module">
import JSZip from "https://esm.sh/jszip";

const FUNCTION_URL = "https://processimage-p5hobbg7wa-uc.a.run.app";

let state = {
  files: [],
  processed: []
};

// ========= CORE LOGIC =========

function clean(name){return name.replace(/\.[^/.]+$/,"");}

function getCity(name){
  const m = clean(name).match(/ in ([a-zA-Z\s]+)$/i);
  return m ? m[1].trim() : "";
}

function getService(name){
  const m = clean(name).match(/best (.+?) (contractor|company)/i);
  return m ? m[1].trim() : "";
}

function getType(name){
  name = name.toLowerCase();
  if(name.includes("thumbnail")) return "thumbnail";
  if(name.includes("who is")) return "paa";
  return "unknown";
}

// ========= RANDOM =========

const devices = [
  {make:"Apple",model:"iPhone 13"},
  {make:"Apple",model:"iPhone 15 Pro"},
  {make:"Samsung",model:"Galaxy S23"},
  {make:"Google",model:"Pixel 8"}
];

function randDevice(){return devices[Math.floor(Math.random()*devices.length)];}

function randDate(){
  const now=new Date();
  const past=new Date();
  past.setFullYear(now.getFullYear()-2);
  return new Date(past.getTime()+Math.random()*(now-past));
}

function exifDate(d){
  return `${d.getFullYear()}:${String(d.getMonth()+1).padStart(2,"0")}:${String(d.getDate()).padStart(2,"0")} 12:00:00`;
}

function randCoords(){
  return {
    lat:33.3+(Math.random()-0.5)*0.1,
    lng:-111.9+(Math.random()-0.5)*0.1
  };
}

// ========= FILE UI =========

const fileInput = document.getElementById("fileInput");
const filesDiv = document.getElementById("files");

fileInput.onchange = e=>{
  state.files = [...e.target.files];
  render();
};

function render(){
  filesDiv.innerHTML="";
  state.files.forEach(f=>{
    const city=getCity(f.name);
    const service=getService(f.name);
    const type=getType(f.name);

    const div=document.createElement("div");
    div.className="file";
    div.innerHTML=`
      <b>${f.name}</b><br>
      Type: ${type}<br>
      City: ${city || "❌"}<br>
      Service: ${service || "❌"}
    `;
    filesDiv.appendChild(div);
  });
}

// ========= PROCESS =========

async function process(){
  state.processed=[];

  for(let file of state.files){

    const city=getCity(file.name);
    const service=getService(file.name);
    const type=getType(file.name);

    if(!city || type==="unknown"){
      alert("Invalid file: "+file.name);
      return;
    }

    const device=randDevice();
    const coords=randCoords();
    const date=randDate();

    const base64=await toBase64(file);

    const res=await fetch(FUNCTION_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        imageBase64:base64,
        fileName:file.name,
        metadata:{
          make:device.make,
          model:device.model,
          copyright:`2026 ${clean(file.name)} - Phoenix Home Remodeling`,
          date:exifDate(date),
          lat:coords.lat,
          lng:coords.lng,
          headline:clean(file.name),
          url:document.getElementById("targetUrl").value,
          city:city
        }
      })
    });

    const blob=await res.blob();

    state.processed.push({
      name:file.name.replace(/\.(png|jpeg|jpg)/i,".jpg"),
      blob
    });
  }

  alert("DONE");
}

// ========= ZIP =========

async function downloadZip(){
  const zip=new JSZip();

  state.processed.forEach(f=>{
    zip.file(f.name,f.blob);
  });

  const blob=await zip.generateAsync({type:"blob"});

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="phr-exif.zip";
  a.click();
}

// ========= HELPERS =========

function toBase64(file){
  return new Promise((res)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
}

</script>
</body>
</html>
